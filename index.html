<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 Layla | 热爱音乐与艺术的20岁</title>
    <!-- 核心样式：以绿色为主调，贴合你的喜好 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 微软雅黑, Arial, sans-serif;
            background-color: #f9fcf8; /* 浅绿底，清新不刺眼 */
            color: #2d4739; /* 深绿文字，和谐统一 */
            line-height: 1.8;
        }
        .container {
            max-width: 700px;
            margin: 60px auto;
            padding: 30px 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(143, 188, 143, 0.2); /* 浅绿阴影 */
            border: 1px solid #d5e8d4;
        }
        .avatar-box {
            text-align: center;
            margin-bottom: 30px;
        }
        /* 绿色圆形头像占位（你可以替换成自己的图片链接） */
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: #8fbc8f;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: white;
        }
        h1 {
            text-align: center;
            color: #556b2f; /* 橄榄绿，突出标题 */
            margin: 20px 0;
            font-size: 32px;
        }
        .info-item {
            margin: 15px 0;
            font-size: 18px;
        }
        .info-item strong {
            color: #2e8b57; /* 海草绿，强调关键词 */
        }
        .hobby {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed #b4d8a7;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #7da370;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar-box">
            <!-- 头像占位：你可以把下面的 "L" 换成自己的头像图片，替换方式看注释 -->
            <!-- 替换示例：<img src="你的图片链接" class="avatar" alt="Layla"> -->
            <div class="avatar">L</div>
        </div>
        
        <h1>Hi，我是 Layla ✨</h1>
        
        <div class="info-item">
            <strong>年龄：</strong>20岁
        </div>
        <div class="info-item">
            <strong>身份：</strong>大三女学生
        </div>
        
        <div class="hobby">
            <div class="info-item">
                <strong>热爱：</strong>音乐 & 艺术
            </div>
            <div class="info-item">
                <strong>偏爱：</strong>充满生机的绿色 💚
            </div>
            <div class="info-item">
                喜欢在旋律和色彩里感受生活，在艺术的世界里寻找属于自己的小美好～
            </div>
        </div>
        
        <footer>
            Layla's Personal Page · 2026
        </footer>
    </div>
</body>
</html>
