<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layla | 高校学生个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f0f5f0;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 80px auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
        }

        /* 左侧头像区域 */
        .avatar-section {
            flex: 1 1 300px;
            background: linear-gradient(135deg, #556b2f, #8fbc8f);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .avatar-wrapper {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
            background-color: #fff;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 右侧简介区域 */
        .intro-section {
            flex: 2 1 400px;
            padding: 50px 40px;
        }

        .intro-section h1 {
            font-size: 36px;
            color: #2d4739;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .intro-section .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
            border-bottom: 2px solid #8fbc8f;
            padding-bottom: 10px;
            display: inline-block;
        }

        .info-list {
            margin: 30px 0;
        }

        .info-item {
            margin: 15px 0;
            font-size: 16px;
        }

        .info-item strong {
            color: #2e8b57;
            font-weight: 600;
            display: inline-block;
            width: 80px;
        }

        .hobby-desc {
            margin-top: 30px;
            padding: 20px;
            background-color: #f9fcf8;
            border-left: 4px solid #8fbc8f;
            border-radius: 4px;
            font-style: italic;
            color: #555;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #7da370;
            font-size: 14px;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                margin: 20px;
            }
            .avatar-section {
                padding: 30px;
            }
            .avatar-wrapper {
                width: 150px;
                height: 150px;
            }
            .intro-section {
                padding: 30px 25px;
            }
            .intro-section h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧头像 -->
        <div class="avatar-section">
            <div class="avatar-wrapper">
                <!-- 替换为你的头像图片链接 -->
                <img src="https://picsum.photos/200/200?random=1" alt="Layla" class="avatar">
            </div>
        </div>

        <!-- 右侧简介 -->
        <div class="intro-section">
            <h1>Layla</h1>
            <div class="subtitle">大三学生 | 热爱音乐与艺术</div>

            <div class="info-list">
                <div class="info-item">
                    <strong>年龄</strong> 20岁
                </div>
                <div class="info-item">
                    <strong>院校</strong> 海南大学
                </div>
                <div class="info-item">
                    <strong>专业</strong> 软件工程
                </div>
                <div class="info-item">
                    <strong>爱好</strong> 音乐、艺术、绿色
                </div>
            </div>

            <div class="hobby-desc">
                我是一名对世界充满好奇的大三学生，在代码与逻辑之外，更热爱用音乐和艺术表达自我。绿色是我最钟爱的颜色，它代表着生机、希望与无限可能。
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 Layla's Personal Page | Designed with 💚
    </footer>
</body>
</html>
